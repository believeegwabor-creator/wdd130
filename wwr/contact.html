<main>

<h1>Contact Us - NEXORA Rafting</h1>

<!-- COMPANY INFO -->
<section>
  <h2>Company Information</h2>
  <p><strong>Address:</strong> Port Harcourt, Nigeria</p>
  <p><strong>Phone:</strong> 09129331386</p>
  <p><strong>Email:</strong> nexora@gmail.com</p>
</section>

<!-- MAP -->
<section>
  <h2>Our Location</h2>
  <iframe 
    src="https://www.google.com/maps?q=Port%20Harcourt&output=embed" 
    width="600" height="300">
  </iframe>
</section>

<!-- EMPLOYEES -->
<section class="employees">

  <figure>
    <img src="images/employee1.jpg" alt="General Manager">
    <figcaption>John – General Manager</figcaption>
  </figure>

  <figure>
    <img src="images/employee2.jpg" alt="Customer Support">
    <figcaption>Mike – Customer Support</figcaption>
  </figure>

  <figure>
    <img src="images/employee3.jpg" alt="Lead Guide">
    <figcaption>Sarah – Lead Guide</figcaption>
  </figure>

</section>

<!-- FORM -->
<section>
  <h2>Send Us a Message</h2>

  <form>

    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <p>Purpose of Message:</p>

    <label>
      <input type="radio" name="purpose" value="general"> General Inquiry
    </label>

    <label>
      <input type="radio" name="purpose" value="reservation"> Reservation Question
    </label>

    <label>
      <input type="radio" name="purpose" value="suggestion"> Website Suggestion
    </label>

    <label for="message">Message:</label>
    <textarea id="message" name="message"></textarea>

    <label>
      <input type="checkbox" name="subscribe">
      Please subscribe me to the monthly newsletter
    </label>

    <button type="submit">Send Message</button>

  </form>
</section>

</main>
