<header>
  <img src="images/logo.png" alt="NEXORA Logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="trips.html">Trips</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<main>

<h1>Contact Us - NEXORA Rafting</h1>

<!-- COMPANY INFO -->
<section>
  <p><strong>Address:</strong> Port Harcourt, Nigeria</p>
  <p><strong>Phone:</strong> 09129331386</p>
  <p><strong>Email:</strong> nexora@gmail.com</p>
</section>

<!-- GOOGLE MAP -->
<section>
  <iframe 
    src="https://www.google.com/maps?q=Port%20Harcourt&output=embed"
    width="100%" height="300">
  </iframe>
</section>

<!-- EMPLOYEES -->
<section class="grid">
  <div>
    <img src="images/employee1.png" alt="General Manager">
    <p>John – General Manager</p>
  </div>

  <div>
    <img src="images/employee2.png" alt="Customer Support">
    <p>Mike – Customer Support</p>
  </div>

  <div>
    <img src="images/employee3.png" alt="Lead Guide">
    <p>Sarah – Lead Guide</p>
  </div>
</section>

<!-- FORM -->
<section>
  <h2>Send Us a Message</h2>

  <form>

    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <p>Purpose of Message:</p>

    <label for="general">
      <input type="radio" id="general" name="purpose" value="general" required>
      General Inquiry
    </label><br>

    <label for="reservation">
      <input type="radio" id="reservation" name="purpose" value="reservation">
      Reservation Question
    </label><br>

    <label for="suggestion">
      <input type="radio" id="suggestion" name="purpose" value="suggestion">
      Website Suggestion
    </label><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" required></textarea><br><br>

    <label for="subscribe">
      <input type="checkbox" id="subscribe" name="subscribe">
      Please subscribe me to the monthly newsletter
    </label><br><br>

    <button type="submit">Send Message</button>

  </form>

</section>

</main>

<footer>
  <p>© 2026 NEXORA | Believe Egwabor</p>

  </nav>
</footer>

</body>
</html>
